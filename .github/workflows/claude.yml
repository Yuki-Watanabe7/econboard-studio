name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          claude_args: |
            --allowedTools "Bash(bash scripts/quality-check.sh),Bash(npm run:*),Bash(npx vitest:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*)"
            --append-system-prompt "コードを変更した場合は、コミットや完了報告の前に必ず bash scripts/quality-check.sh を実行すること。失敗したらエラーを調査して修正し、全チェックが通るまで繰り返す。最終実行が通っていない状態で完了と報告しない。権限や環境の問題で実行できない場合は、その旨を明示的に報告し、完了報告を作成しないこと。"

      # Claude の作業結果を CI と同じゲートで最終検証する
      - name: Run quality checks after Claude
        if: always()
        run: bash scripts/quality-check.sh
